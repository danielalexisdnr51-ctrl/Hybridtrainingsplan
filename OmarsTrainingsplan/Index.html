<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HYBRID ATHLETE | Training Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-base: #08090c;
            --bg-surface: #11131a;
            --bg-surface-card: #171a24;
            --accent: #ccff00; /* Neon Lime / Volt */
            --accent-glow: rgba(204, 255, 0, 0.25);
            --text-primary: #ffffff;
            --text-secondary: #8a8f9c;
            --text-muted: #525866;
            --border: #222634;
            --success: #00ff87;
            --radius-lg: 16px;
            --radius-md: 12px;
            --radius-sm: 8px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background-color: var(--bg-base);
            color: var(--text-primary);
            display: flex;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Smartphone Frame Container for Desktop, full screen on Mobile */
        .app-container {
            width: 100%;
            max-width: 480px;
            background-color: var(--bg-surface);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
            border-left: 1px solid var(--border);
            border-right: 1px solid var(--border);
            padding-bottom: 90px; /* Space for the floating timer / navigation */
        }

        /* Header Style */
        header {
            padding: 24px 20px 16px 20px;
            background: linear-gradient(to bottom, rgba(17,19,26,1) 80%, rgba(17,19,26,0) 100%);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .profile-section {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }

        .user-info h1 {
            font-size: 20px;
            font-weight: 800;
            letter-spacing: -0.5px;
            text-transform: uppercase;
        }

        .user-info p {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 2px;
        }

        .badge {
            background: var(--accent-glow);
            border: 1px solid var(--accent);
            color: var(--accent);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        /* Overall Progress Bar */
        .progress-box {
            background: var(--bg-surface-card);
            border: 1px solid var(--border);
            padding: 14px;
            border-radius: var(--radius-md);
            margin-bottom: 12px;
        }

        .progress-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            font-size: 12px;
            font-weight: 600;
        }

        .progress-label { color: var(--text-secondary); }
        .progress-percentage { color: var(--accent); font-weight: 700; }

        .progress-bar-bg {
            background: var(--border);
            height: 6px;
            border-radius: 3px;
            overflow: hidden;
        }

        .progress-bar-fill {
            background: var(--accent);
            box-shadow: 0 0 10px var(--accent-glow);
            height: 100%;
            width: 0%;
            transition: width 0.4s ease;
        }

        /* Coach Daily Tip Widget */
        .coach-tip {
            background: rgba(204, 255, 0, 0.04);
            border-left: 3px solid var(--accent);
            padding: 10px 14px;
            font-size: 12px;
            color: var(--text-primary);
            border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
            line-height: 1.4;
        }
        .coach-tip strong { color: var(--accent); }

        /* Horizontal Day Selector Slider */
        .day-slider {
            display: flex;
            overflow-x: auto;
            gap: 10px;
            padding: 8px 20px 16px 20px;
            scroll-behavior: smooth;
            scrollbar-width: none; /* Hide scrollbar Firefox */
        }
        .day-slider::-webkit-scrollbar {
            display: none; /* Hide scrollbar Chrome/Safari */
        }

        .day-btn {
            flex: 0 0 auto;
            background: var(--bg-surface-card);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            padding: 10px 16px;
            border-radius: var(--radius-md);
            cursor: pointer;
            text-align: center;
            transition: var(--transition);
        }

        .day-btn .day-name {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            display: block;
            margin-bottom: 2px;
        }

        .day-btn .day-title {
            font-size: 13px;
            font-weight: 700;
            color: var(--text-primary);
        }

        .day-btn.active {
            background: var(--text-primary);
            border-color: var(--text-primary);
        }
        .day-btn.active .day-name { color: #000000; opacity: 0.7; }
        .day-btn.active .day-title { color: #000000; }

        .day-btn.rest-day-btn.active {
            background: var(--border);
            border-color: var(--text-secondary);
        }
        .day-btn.rest-day-btn.active .day-name, 
        .day-btn.rest-day-btn.active .day-title { color: var(--text-primary); }

        /* Main Exercise Content Area */
        main {
            padding: 0 20px 20px 20px;
            flex-grow: 1;
        }

        .section-title {
            font-size: 14px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-secondary);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .workout-focus {
            font-size: 12px;
            color: var(--accent);
            text-transform: none;
            font-weight: 500;
        }

        /* Rest Day Card View */
        .rest-day-card {
            background: var(--bg-surface-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 30px 20px;
            text-align: center;
            margin-top: 10px;
            animation: fadeIn 0.4s ease;
        }
        .rest-day-card h3 {
            font-size: 18px;
            color: var(--accent);
            margin-bottom: 8px;
        }
        .rest-day-card p {
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.5;
        }

        /* Exercise Cards */
        .exercise-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .exercise-card {
            background: var(--bg-surface-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: var(--transition);
            position: relative;
            overflow: hidden;
            animation: fadeIn 0.3s ease;
        }

        .exercise-card.completed {
            border-color: rgba(0, 255, 135, 0.3);
            background: rgba(0, 255, 135, 0.02);
        }

        .card-left {
            display: flex;
            align-items: center;
            gap: 14px;
            flex: 1;
        }

        /* Custom Checkbox Design */
        .checkbox-wrapper {
            position: relative;
            width: 24px;
            height: 24px;
            cursor: pointer;
        }

        .checkbox-wrapper input {
            opacity: 0;
            width: 0;
            height: 0;
            position: absolute;
        }

        .custom-checkbox {
            position: absolute;
            top: 0;
            left: 0;
            height: 24px;
            width: 24px;
            background-color: transparent;
            border: 2px solid var(--border);
            border-radius: 50%;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .checkbox-wrapper input:checked ~ .custom-checkbox {
            background-color: var(--success);
            border-color: var(--success);
            box-shadow: 0 0 8px rgba(0, 255, 135, 0.4);
        }

        .custom-checkbox::after {
            content: "";
            position: absolute;
            display: none;
            width: 5px;
            height: 10px;
            border: solid #000;
            border-width: 0 2px 2px 0;
            transform: rotate(45deg);
            margin-bottom: 2px;
        }

        .checkbox-wrapper input:checked ~ .custom-checkbox::after {
            display: block;
        }

        .exercise-info-block {
            cursor: pointer;
            flex: 1;
        }

        .exercise-name {
            font-size: 15px;
            font-weight: 700;
            color: var(--text-primary);
            transition: var(--transition);
        }

        .exercise-card.completed .exercise-name {
            color: var(--text-secondary);
            text-decoration: line-through;
        }

        .exercise-meta {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 4px;
            display: flex;
            gap: 12px;
        }

        .meta-tag {
            background: rgba(255, 255, 255, 0.05);
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: 600;
        }
        
        .meta-tag.sets {
            color: var(--accent);
            background: rgba(204, 255, 0, 0.08);
        }

        .info-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
        }

        .info-btn:hover {
            color: var(--accent);
        }

        /* Floating Rest Timer Widget */
        .timer-widget {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: calc(100% - 40px);
            max-width: 440px;
            background: rgba(23, 26, 36, 0.9);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            z-index: 100;
        }

        .timer-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .timer-icon-box {
            width: 36px;
            height: 36px;
            background: var(--border);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--accent);
        }
        
        .timer-icon-box.active {
            animation: pulse 1s infinite alternate;
            background: var(--accent-glow);
        }

        .timer-text h4 {
            font-size: 13px;
            font-weight: 700;
        }

        .timer-text p {
            font-size: 11px;
            color: var(--text-secondary);
        }

        .timer-controls {
            display: flex;
            gap: 6px;
        }

        .t-btn {
            background: var(--border);
            border: none;
            color: var(--text-primary);
            padding: 6px 12px;
            font-size: 12px;
            font-weight: 700;
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: var(--transition);
        }

        .t-btn.start {
            background: var(--accent);
            color: #000000;
        }

        /* Modal Overlay for Detailed Exercise Info */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            z-index: 200;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .modal-overlay.open {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-sheet {
            width: 100%;
            max-width: 480px;
            background: var(--bg-surface-card);
            border-top: 1px solid var(--border);
            border-top-left-radius: 24px;
            border-top-right-radius: 24px;
            padding: 24px;
            transform: translateY(100%);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            max-height: 85vh;
            overflow-y: auto;
        }

        .modal-overlay.open .modal-sheet {
            transform: translateY(0);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 20px;
        }

        .modal-title h2 {
            font-size: 20px;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .modal-close {
            background: var(--border);
            border: none;
            color: var(--text-primary);
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
        }

        .modal-meta-row {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .modal-tag {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            padding: 8px 14px;
            border-radius: var(--radius-sm);
            font-size: 13px;
            font-weight: 600;
        }
        .modal-tag strong {
            color: var(--accent);
        }

        .modal-section-title {
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--text-secondary);
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .modal-body-text {
            font-size: 14px;
            color: var(--text-primary);
            line-height: 1.6;
            margin-bottom: 20px;
            background: var(--bg-base);
            padding: 14px;
            border-radius: var(--radius-md);
            border: 1px solid var(--border);
        }

        /* Graphic/Animation Placeholder inside modal */
        .animation-container {
            width: 100%;
            height: 160px;
            background: linear-gradient(45deg, #11131a, #222634);
            border-radius: var(--radius-md);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px dashed var(--text-muted);
            position: relative;
            overflow: hidden;
        }

        .animation-pulse-ring {
            position: absolute;
            width: 60px;
            height: 60px;
            border: 2px solid var(--accent);
            border-radius: 50%;
            animation: ripple 2s infinite ease-out;
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulse {
            from { transform: scale(1); box-shadow: 0 0 0 rgba(204, 255, 0, 0); }
            to { transform: scale(1.05); box-shadow: 0 0 12px rgba(204, 255, 0, 0.4); }
        }

        @keyframes ripple {
            0% { transform: scale(0.6); opacity: 1; }
            100% { transform: scale(2.5); opacity: 0; }
        }
    </style>
</head>
